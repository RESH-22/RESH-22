name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: RESH-22
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ff4db8&color_dots=#2e0f3d,#6d28d9,#9333ea,#c026d3,#ff4db8

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
