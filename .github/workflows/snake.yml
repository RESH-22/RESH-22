name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: RESH-22
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=ff69b4&color_dots=#2c003e,#4b0082,#6a0dad,#8e44ad,#ff69b4

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
